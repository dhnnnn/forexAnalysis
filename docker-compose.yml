version: "3.8"

services:
  # ════════════════════════════════════════
  # TimescaleDB — Time-series database
  # ════════════════════════════════════════
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: forex-timescaledb
    environment:
      POSTGRES_USER: forex_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-forexpass123}
      POSTGRES_DB: forex_db
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forex_user -d forex_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ════════════════════════════════════════
  # Redis — Cache (price + sentiment)
  # ════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: forex-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ════════════════════════════════════════
  # Go Forex Agent — Core engine
  # ════════════════════════════════════════
  forex-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forex-agent
    env_file:
      - .env
    environment:
      - TZ=Asia/Jakarta
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ════════════════════════════════════════
  # WhatsApp Baileys Service — Node.js
  # (Akan diaktifkan di Minggu 4)
