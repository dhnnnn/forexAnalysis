# Connection upgrade map — hanya set "upgrade" jika ada Upgrade header
# Untuk regular HTTP POST (GraphQL queries), set ke "close" bukan "upgrade"
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy GraphQL — HTTP POST (queries) dan WebSocket (subscriptions)
    location /graphql {
        proxy_pass         http://forex-agent:8080/graphql;
        proxy_http_version 1.1;

        # Properly handle both WS upgrade and regular HTTP
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Forward real client info
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward WebSocket subprotocol header (graphql-transport-ws)
        proxy_set_header   Sec-WebSocket-Protocol $http_sec_websocket_protocol;

        # Long timeouts for WebSocket subscriptions
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
